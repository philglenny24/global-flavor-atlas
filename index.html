<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Flavor Atlas | Discover Recipes</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <header>
        <nav>
            <h1 class="logo">Global Flavor Atlas</h1>
            <div class="search-container">
                <input type="text" id="recipe-search" placeholder="Search by ingredient or dish ...">
                <button id="search-btn">Search</button>
            </div>
        </nav>
    </header>

    <main id="app">
        <section id="filters">
        </section>

        <section id="recipe-grid">
            <p class="Loading">Hungry? Loading recipes...</p>
        </section>
    </main>

    <script type="module" src="index.js"></script>
</body>
</html>
